<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>☠️ GitHub Pages XSS Playground</title>
<style>
    body { font-family: monospace; background:#000; color:#0f0; padding:20px; }
    .box { max-width:900px; margin:auto; background:#111; padding:25px; border:3px solid #f00; }
    input, textarea { width:100%; padding:12px; background:#222; color:#0f0; border:2px solid #f00; margin:10px 0; }
    button { padding:15px 25px; background:#c00; color:white; border:none; font-weight:bold; cursor:pointer; }
    .output { padding:20px; background:#000; border:2px dashed #f00; margin:15px 0; min-height:60px; }
    .red { color:#f66; }
</style>
</head>
<body>
<div class="box">
    <h1 class="red">☠️ GITHUB PAGES MAX VULNERABLE PLAYGROUND ☠️</h1>
    <p>GitHub CSP is strict — only certain vectors work.</p>

    <h2>1. innerHTML + DOM XSS (Most Reliable on GitHub)</h2>
    <textarea id="in1" rows="4" placeholder="Paste payload here..."></textarea>
    <button onclick="sink1()">Inject via innerHTML</button>
    <div id="out1" class="output"></div>

    <h2>2. SVG + MathML + Template Vectors</h2>
    <input id="in2" placeholder="<svg><desc><![CDATA[</desc><script>alert(1)</script>]]></svg>">
    <button onclick="sink2()">Inject SVG/MathML</button>
    <div id="out2" class="output"></div>

    <h2>3. URL Hash + Search Reflection</h2>
    <button onclick="urlSinks()">Test Hash & Query Params</button>
    <div id="out3" class="output"></div>

    <h2>4. Persistent (localStorage)</h2>
    <input id="in4" placeholder="Persistent XSS">
    <button onclick="storeXSS()">Save & Show</button>
    <div id="out4" class="output"></div>
</div>

<script>
// Works better on GitHub Pages
function sink1() {
    const payload = document.getElementById('in1').value;
    document.getElementById('out1').innerHTML = payload;
}

function sink2() {
    const payload = document.getElementById('in2').value;
    document.getElementById('out2').innerHTML = payload;
}

function urlSinks() {
    let html = `<b>Hash:</b> ${decodeURIComponent(location.hash.slice(1) || 'none')}<br>`;
    html += `<b>Search:</b> ${decodeURIComponent(location.search)}<br>`;
    
    const params = new URLSearchParams(location.search);
    if (params.has('x')) {
        html += `<span class="red">XSS from ?x= → ${params.get('x')}</span>`;
    }
    
    document.getElementById('out3').innerHTML = html;
}

function storeXSS() {
    const val = document.getElementById('in4').value;
    localStorage.setItem('xss', val);
    document.getElementById('out4').innerHTML = `<b>STORED:</b><br>` + val;
}

// Auto load stored
document.getElementById('out4').innerHTML = `<b>STORED:</b><br>` + (localStorage.getItem('xss') || "Nothing yet");

// Auto hash trigger
if (location.hash) {
    document.getElementById('out3').innerHTML += `<br><span class="red">HASH TRIGGERED: ${decodeURIComponent(location.hash.slice(1))}</span>`;
}
</script>
</body>
</html>
